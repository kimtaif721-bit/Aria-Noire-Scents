<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT US</title>
    <link rel="stylesheet" href=".vscode/aria noire/minimal.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
 body {
            display: flex;
            background: linear-gradient(135deg, #45362c 0%, #2c1f15 100%);
            color: #333;
            overflow-x: hidden;
        }

 /* Sidebar - Consistent across pages */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
            color: white;
            transition: width 0.4s ease;
            position: fixed;
            z-index: 1000;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar .logo {
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #374151;
        }

        .sidebar .logo img {
            width: 80px;
            height: 40px;
            margin-bottom: 10px;
        }

        .sidebar ul {
            list-style: none;
            padding: 20px 0;
        }

        .sidebar ul li {
            padding: 15px 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            border-left: 3px solid transparent;
        }

        .sidebar ul li:hover {
            background: #374151;
            border-left-color: #4f46e5;
            padding-left: 30px;
        }

        .sidebar ul li a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .sidebar ul li img {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .sidebar ul li span {
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed ul li span {
            opacity: 0;
        }

        .sidebar-footer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid #374151;
            margin-top: auto;
            font-size: 12px;
        }

        /* Toggle Button */
        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 10px;
            background: linear-gradient(45deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .toggle-btn:hover {
            transform: rotate(90deg);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }



/* MAIN CONTENT */
.main-content{
    flex:1;
    padding:40px;
}

/* CONTACT CARD */
.contact-container{
    background:rgba(240, 189, 189, 0.9);;
    max-width:900px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.contact-container h2{
    text-align:center;
    margin-bottom:20px;
    color:#1e3c72;
}

.contact-wrapper{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
}

.contact-form{
    flex:1;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

.contact-form button{
    width:100%;
    padding:12px;
    border:none;
    background:#1e3c72;
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.contact-form button:hover{
    background:#16325c;
}

.contact-info{
    flex:1;
}

.social-links{
    margin-top:15px;
}

.social-links a{
    display:inline-block;
    margin-right:10px;
    padding:10px 15px;
    border-radius:6px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.instagram{
    background:#E1306C;
}

.whatsapp{
    background:#25D366;
}

/* RESPONSIVE */
@media(max-width:768px){
    .contact-wrapper{
        flex-direction:column;
    }
}
</style>
</head>

</html>
